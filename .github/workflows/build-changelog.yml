name: Build Changelog

on:
  push:
    branches: [main]
    paths:
      - "docs/changelog-entries/**"

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build changelog.mdx from entries
        run: node docs/scripts/build-changelog.mjs

      - name: Create changelog pull request
        uses: peter-evans/create-pull-request@v7
        with:
          add-paths: docs/changelog.mdx
          base: main
          branch: automation/rebuild-changelog
          commit-message: "docs: rebuild changelog"
          delete-branch: true
          title: "docs: rebuild changelog"
          body: |
            Automated update for the generated changelog document.
