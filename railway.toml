[build]
builder = "dockerfile"
dockerfilePath = "docker/Dockerfile.prod"
buildArgs = { NEXT_PUBLIC_BASE_URL = "$NEXT_PUBLIC_BASE_URL", NEXT_PUBLIC_BYPASS_PREMIUM_CHECKS = "$NEXT_PUBLIC_BYPASS_PREMIUM_CHECKS", NEXT_PUBLIC_EMAIL_SEND_ENABLED = "$NEXT_PUBLIC_EMAIL_SEND_ENABLED", NEXT_PUBLIC_DIGEST_ENABLED = "$NEXT_PUBLIC_DIGEST_ENABLED", NEXT_PUBLIC_MEETING_BRIEFS_ENABLED = "$NEXT_PUBLIC_MEETING_BRIEFS_ENABLED", NEXT_PUBLIC_CLEANER_ENABLED = "$NEXT_PUBLIC_CLEANER_ENABLED", NEXT_PUBLIC_AUTO_DRAFT_DISABLED = "$NEXT_PUBLIC_AUTO_DRAFT_DISABLED", NEXT_PUBLIC_INTEGRATIONS_ENABLED = "$NEXT_PUBLIC_INTEGRATIONS_ENABLED", NEXT_PUBLIC_WEBHOOK_ACTION_ENABLED = "$NEXT_PUBLIC_WEBHOOK_ACTION_ENABLED" }

[deploy]
startCommand = "/app/docker/scripts/start.sh"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
